<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PORTAL | OC62ARR Hub</title>
    <!-- Tailwind + Fonts + Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SortableJS for drag drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- QRCode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* lebih premium feel */
        }

        body {
            font-family: 'Rajdhani', 'Orbitron', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #02040c);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Cyberpunk Grid & Scanlines */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* Scan line animasi */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0.05) 0px, rgba(0,255,255,0.05) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 2;
            animation: scanMove 8s linear infinite;
        }

        @keyframes scanMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 20px; }
        }

        /* Glassmorphism cyberpunk */
        .glass-panel {
            background: rgba(8, 12, 25, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* Neon Glow Text & Button */
        .neon-text {
            text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #f0f;
        }

        .neon-btn {
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .neon-btn:hover {
            box-shadow: 0 0 12px cyan, 0 0 25px magenta;
            transform: translateY(-2px);
            border-color: cyan;
        }

        .neon-btn:active {
            transform: scale(0.98);
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.6);
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* Glitch text animation */
        .glitch-text {
            animation: glitch 1.5s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0.05em 0 0 rgba(255,0,255,0.7), -0.05em -0.025em 0 rgba(0,255,255,0.7); }
            25% { text-shadow: -0.05em -0.025em 0 rgba(255,0,255,0.7), 0.025em 0.05em 0 rgba(0,255,255,0.7); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,255,0.7), 0.05em 0 0 rgba(0,255,255,0.7); }
            75% { text-shadow: -0.025em 0 0 rgba(255,0,255,0.7), 0.025em 0.025em 0 rgba(0,255,255,0.7); }
        }

        /* Hologram card effect */
        .hologram-card {
            background: linear-gradient(135deg, rgba(0, 20, 40, 0.7), rgba(10, 5, 30, 0.7));
            border: 1px solid rgba(0, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        /* Flicker neon real */
        @keyframes flicker {
            0% { opacity: 0.8; text-shadow: 0 0 5px cyan; }
            50% { opacity: 1; text-shadow: 0 0 20px cyan, 0 0 5px magenta; }
            100% { opacity: 0.9; text-shadow: 0 0 8px cyan; }
        }
        .flicker-neon {
            animation: flicker 3s infinite alternate;
        }

        /* Link item animasi muncul */
        .link-item {
            opacity: 0;
            transform: translateY(20px);
            animation: slideFadeUp 0.4s forwards;
        }

        @keyframes slideFadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* custom scroll */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0f1e; }
        ::-webkit-scrollbar-thumb { background: cyan; border-radius: 10px; }

        /* Halaman transisi super halus */
        .page-transition {
            transition: opacity 0.25s ease, transform 0.2s;
        }
        .hidden-page {
            display: none;
            opacity: 0;
        }

        /* drag ghost */
        .sortable-drag {
            opacity: 0.4;
            background: rgba(0,255,255,0.2);
            border: 2px dashed cyan;
        }

        /* custom toggle */
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #1a1f2e;
            border-radius: 40px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid cyan;
        }
        .toggle-switch.active {
            background: #0ff;
            box-shadow: 0 0 12px cyan;
        }
        .toggle-knob {
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active .toggle-knob {
            left: 22px;
            background: #000;
        }
    </style>
</head>
<body class="text-white relative">

<div class="cyber-grid"></div>
<div class="scan-line"></div>

<!-- Audio klik futuristik -->
<audio id="clickSound" preload="auto">
    <source src="data:audio/wav;base64,U3RlYWx0aCBzb3VuZA==">
</audio>
<script>
    // Fake but functional: generate beep via web audio (fallback)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playCyberClick() {
        try {
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gain.gain.value = 0.2;
            oscillator.type = "sine";
            oscillator.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
            oscillator.stop(audioCtx.currentTime + 0.2);
        } catch(e) { }
    }
    // init audio context on first user click
    document.body.addEventListener('click', () => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: true });
</script>

<div id="app" class="relative z-10 w-full min-h-screen flex flex-col items-center justify-center p-4 md:p-6">
    <!-- Public View -->
    <div id="publicView" class="w-full max-w-md mx-auto page-transition">
        <div class="glass-panel p-6 w-full shadow-2xl">
            <!-- Foto profil bulat dengan neon glow -->
            <div class="flex justify-center mb-4">
                <div class="relative w-28 h-28 rounded-full border-4 border-cyan-400 shadow-[0_0_20px_cyan] overflow-hidden bg-black">
                    <img id="profileImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300ffff'/%3E%3Ctext x='50' y='67' font-size='40' text-anchor='middle' fill='black'%3E🤖%3C/text%3E%3C/svg%3E" class="w-full h-full object-cover">
                </div>
            </div>
            <div class="text-center mb-5">
                <h1 id="displayName" class="text-3xl font-bold orbitron tracking-wider glitch-text flicker-neon">POC - OC62ARR</h1>
                <p id="displayBio" class="text-cyan-300 mt-2 text-sm uppercase tracking-widest">// POC KALTIM HUB //</p>
            </div>
            <!-- Links Container -->
            <div id="linksListPublic" class="space-y-4"></div>
            <!-- QR Code generator -->
            <div class="mt-6 flex justify-center">
                <div id="qrCodeContainer" class="p-2 bg-black/50 rounded-xl border border-cyan-500"></div>
            </div>
            <div class="text-center text-[10px] text-cyan-400/60 mt-4">⚡ POC KALTIM HUB v2.0 ⚡</div>
        </div>
        <!-- Admin button kecil -->
        <div class="text-center mt-4">
            <button id="gotoAdminBtn" class="text-xs px-4 py-2 rounded-full border border-cyan-600 text-cyan-400 hover:bg-cyan-900/40 transition-all"><i class="fas fa-terminal mr-1"></i> ADMIN PANEL</button>
        </div>
    </div>

    <!-- Admin View -->
    <div id="adminView" class="w-full max-w-3xl mx-auto page-transition hidden-page">
        <div class="glass-panel p-5 shadow-2xl">
            <div class="flex justify-between items-center border-b border-cyan-500/50 pb-3 mb-4">
                <h2 class="text-2xl font-bold neon-text"><i class="fas fa-cogs"></i> NEO ADMIN</h2>
                <button id="logoutAdminBtn" class="text-pink-400 border border-pink-500 px-3 py-1 rounded-xl text-sm hover:bg-pink-900/30"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <!-- PIN Login (default show) -->
            <div id="loginPanel">
                <div class="bg-black/40 p-5 rounded-2xl border border-cyan-400">
                    <label class="block text-cyan-300 mb-2"><i class="fas fa-key"></i> MASUKKAN PIN 4 DIGIT</label>
                    <input type="password" id="pinInput" maxlength="4" class="w-full bg-black/60 border border-cyan-500 rounded-xl px-4 py-3 text-white font-mono text-center text-2xl" placeholder="****">
                    <button id="loginPinBtn" class="mt-4 w-full neon-btn bg-gradient-to-r from-cyan-700 to-purple-700 py-2 rounded-xl font-bold">AUTHENTICATE</button>
                    <p class="text-xs text-gray-400 mt-3">Default PIN: 1234</p>
                </div>
            </div>
            <!-- Admin Dashboard (hidden until login) -->
            <div id="adminDashboard" style="display:none;">
                <!-- Profil Setting -->
                <div class="mb-6 border-b border-fuchsia-500/40 pb-4">
                    <h3 class="text-lg text-cyan-400"><i class="fas fa-user-astronaut"></i> PROFIL</h3>
                    <div class="grid md:grid-cols-2 gap-3 mt-2">
                        <input type="text" id="adminName" placeholder="Nama tampilan" class="bg-black/50 border border-purple-500 rounded-lg p-2 text-white">
                        <input type="text" id="adminBio" placeholder="Bio / Slogan" class="bg-black/50 border border-purple-500 rounded-lg p-2 text-white">
                        <div>
                            <label class="text-xs text-cyan-400">Foto URL (atau upload base64)</label>
                            <input type="file" id="profileUpload" accept="image/*" class="bg-black/50 border border-pink-500 rounded-lg p-1 text-white text-sm">
                        </div>
                        <button id="saveProfileBtn" class="bg-cyan-700 hover:bg-cyan-600 rounded-xl py-2"><i class="fas fa-save"></i> Simpan Profil</button>
                    </div>
                </div>
                <!-- Link Manager -->
                <div class="mb-5 flex justify-between items-center">
                    <h3 class="text-xl text-pink-400"><i class="fas fa-link"></i> LINK DATABASE</h3>
                    <button id="addLinkBtn" class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded-xl text-sm"><i class="fas fa-plus"></i> Tambah Link</button>
                </div>
                <!-- Drag drop list -->
                <div id="linksAdminList" class="space-y-3 max-h-[380px] overflow-y-auto pr-2"></div>
                <!-- Statistik klik sederhana -->
                <div class="mt-6 glass-panel p-3">
                    <div class="flex justify-between text-xs"><span>📊 TOTAL KLIK LINK</span><span id="totalClicksStat">0</span></div>
                    <button id="resetStatsBtn" class="text-[10px] text-red-400 mt-1">Reset statistik</button>
                </div>
                <p class="text-center text-[10px] text-cyan-500 mt-4">⚡ DRAG & DROP untuk mengubah urutan ⚡</p>
            </div>
        </div>
        <div class="text-center mt-3">
            <button id="previewPublicBtn" class="text-cyan-300 text-sm underline">🔮 Preview Halaman Publik</button>
        </div>
    </div>
</div>

<!-- Toast Notif -->
<div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-black/90 border-l-8 border-cyan-400 text-white px-5 py-3 rounded-full text-sm font-mono z-50 hidden transition-all shadow-[0_0_20px_cyan]">✨ Notifikasi</div>

<script>
    // ---------- DATA MODEL ----------
    let links = []; // {id, title, url, emoji, active, clicks}
    let profile = { name: "NE0_DR1V3R", bio: "// CYBERPUNK HUB //", avatar: null };
    let isAdminLogged = false;
    let currentPin = "1234";
    let sortableInstance = null;

    // Load/Save LocalStorage
    function loadData() {
        const storedLinks = localStorage.getItem("neolink_links");
        if(storedLinks) links = JSON.parse(storedLinks);
        else links = [
            { id: "1", title: "Portfolio Website", url: "https://example.com", emoji: "🚀", active: true, clicks: 0 },
            { id: "2", title: "YouTube Channel", url: "https://youtube.com", emoji: "📺", active: true, clicks: 0 },
            { id: "3", title: "WhatsApp", url: "https://wa.me/628123456789", emoji: "💬", active: true, clicks: 0 }
        ];
        const storedProfile = localStorage.getItem("neolink_profile");
        if(storedProfile) profile = JSON.parse(storedProfile);
        else profile = { name: "NE0_DR1V3R", bio: "// CYBERPUNK HUB //", avatar: null };
        const storedPin = localStorage.getItem("neolink_pin");
        if(storedPin) currentPin = storedPin;
        const storedStats = localStorage.getItem("neolink_clicks");
        if(storedStats) {
            let clickMap = JSON.parse(storedStats);
            links.forEach(link => { if(clickMap[link.id]) link.clicks = clickMap[link.id]; else if(link.clicks===undefined) link.clicks=0; });
        } else {
            links.forEach(l => { if(l.clicks===undefined) l.clicks=0; });
        }
        saveLinksToLocal();
        saveProfileLocal();
    }

    function saveLinksToLocal() {
        localStorage.setItem("neolink_links", JSON.stringify(links));
        const clickObj = {};
        links.forEach(l => { clickObj[l.id] = l.clicks || 0; });
        localStorage.setItem("neolink_clicks", JSON.stringify(clickObj));
    }
    function saveProfileLocal() { localStorage.setItem("neolink_profile", JSON.stringify(profile)); }
    function updatePin(newPin) { currentPin = newPin; localStorage.setItem("neolink_pin", newPin); showToast("PIN berhasil diubah!", "success"); }

    // Helpers
    function showToast(msg, type="info") {
        const toast = document.getElementById("toast");
        toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-bolt'} mr-2"></i> ${msg}`;
        toast.classList.remove("hidden");
        setTimeout(() => toast.classList.add("hidden"), 2200);
    }

    function renderPublicLinks() {
        const container = document.getElementById("linksListPublic");
        if(!container) return;
        const activeLinks = links.filter(l => l.active === true);
        container.innerHTML = "";
        activeLinks.forEach((link, idx) => {
            const btn = document.createElement("a");
            btn.href = "#";
            btn.className = "link-item w-full neon-btn glass-panel flex items-center justify-between p-4 rounded-xl transition-all hover:border-cyan-300 cursor-pointer group";
            btn.style.animationDelay = `${idx * 0.05}s`;
            btn.innerHTML = `<div class="flex items-center gap-3"><span class="text-2xl">${link.emoji || "🔗"}</span><span class="font-bold tracking-wide">${link.title}</span></div><i class="fas fa-arrow-right text-cyan-400 group-hover:translate-x-1 transition"></i>`;
            btn.addEventListener("click", async (e) => {
                e.preventDefault();
                playCyberClick();
                // increment clicks
                link.clicks = (link.clicks || 0) + 1;
                saveLinksToLocal();
                renderAdminLinks(); // update stats on admin
                window.open(link.url, "_blank");
                showToast(`🔗 Membuka ${link.title}`);
            });
            container.appendChild(btn);
        });
        document.getElementById("displayName").innerText = profile.name || "NE0_DR1V3R";
        document.getElementById("displayBio").innerText = profile.bio || "// CYBERPUNK HUB //";
        if(profile.avatar && profile.avatar !== "") document.getElementById("profileImage").src = profile.avatar;
        else document.getElementById("profileImage").src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300ffff'/%3E%3Ctext x='50' y='67' font-size='40' text-anchor='middle' fill='black'%3E🤖%3C/text%3E%3C/svg%3E";
        // generate QR for current URL
        const qrDiv = document.getElementById("qrCodeContainer");
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: window.location.href, width: 100, height: 100, colorDark: "#00ffff", colorLight: "#000000" });
    }

    function renderAdminLinks() {
        const container = document.getElementById("linksAdminList");
        if(!container) return;
        container.innerHTML = "";
        links.forEach((link, idx) => {
            const div = document.createElement("div");
            div.setAttribute("data-id", link.id);
            div.className = "hologram-card p-3 rounded-xl flex flex-wrap items-center gap-2 justify-between transition-all";
            div.innerHTML = `
                <div class="flex items-center gap-3 flex-1 min-w-[160px]">
                    <i class="fas fa-grip-vertical text-gray-400 cursor-move"></i>
                    <span class="text-2xl">${link.emoji || "🔗"}</span>
                    <div class="flex flex-col">
                        <span class="font-bold text-sm">${link.title}</span>
                        <span class="text-[10px] text-cyan-400 truncate w-32">${link.url}</span>
                        <span class="text-[9px] text-pink-300">👆 klik: ${link.clicks || 0}</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="toggle-switch ${link.active ? 'active' : ''}" data-id="${link.id}"><div class="toggle-knob"></div></div>
                    <button class="editLinkBtn text-yellow-400" data-id="${link.id}"><i class="fas fa-edit"></i></button>
                    <button class="deleteLinkBtn text-red-500" data-id="${link.id}"><i class="fas fa-trash"></i></button>
                </div>
            `;
            container.appendChild(div);
        });
        // toggle events
        document.querySelectorAll(".toggle-switch").forEach(toggle => {
            toggle.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = toggle.getAttribute("data-id");
                const link = links.find(l => l.id === id);
                if(link) { link.active = !link.active; saveLinksToLocal(); renderAdminLinks(); renderPublicLinks(); showToast(`Link ${link.active ? "diaktifkan" : "dinonaktifkan"}`); playCyberClick(); }
            });
        });
        document.querySelectorAll(".editLinkBtn").forEach(btn => {
            btn.addEventListener("click", () => { const id = btn.getAttribute("data-id"); editLinkById(id); });
        });
        document.querySelectorAll(".deleteLinkBtn").forEach(btn => {
            btn.addEventListener("click", () => { const id = btn.getAttribute("data-id"); if(confirm("Hapus link ini?")) { links = links.filter(l => l.id !== id); saveLinksToLocal(); renderAdminLinks(); renderPublicLinks(); showToast("Link terhapus", "success"); playCyberClick(); } });
        });
        // init sortable
        if(sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(container, {
            animation: 200,
            handle: ".fa-grip-vertical",
            onEnd: function() {
                const newOrder = [];
                document.querySelectorAll("#linksAdminList > div").forEach(el => {
                    const id = el.getAttribute("data-id");
                    const found = links.find(l => l.id === id);
                    if(found) newOrder.push(found);
                });
                if(newOrder.length === links.length) { links = newOrder; saveLinksToLocal(); renderAdminLinks(); renderPublicLinks(); showToast("Urutan tersimpan"); }
            }
        });
        document.getElementById("totalClicksStat").innerText = links.reduce((sum,l)=> sum + (l.clicks||0),0);
    }

    function editLinkById(id) {
        const link = links.find(l => l.id === id);
        if(!link) return;
        const newTitle = prompt("Edit Judul:", link.title);
        if(newTitle !== null) link.title = newTitle;
        const newUrl = prompt("Edit URL:", link.url);
        if(newUrl !== null) link.url = newUrl;
        const newEmoji = prompt("Edit Emoji (1 karakter):", link.emoji);
        if(newEmoji !== null) link.emoji = newEmoji;
        saveLinksToLocal();
        renderAdminLinks();
        renderPublicLinks();
        showToast("Link diupdate");
        playCyberClick();
    }

    function addNewLink() {
        const title = prompt("Judul Link", "New Link");
        if(!title) return;
        const url = prompt("URL (https://...)");
        if(!url) return;
        const emoji = prompt("Emoji", "🔗");
        const newId = Date.now().toString();
        links.push({ id: newId, title, url, emoji: emoji || "🔗", active: true, clicks: 0 });
        saveLinksToLocal();
        renderAdminLinks();
        renderPublicLinks();
        showToast("Link ditambahkan!");
        playCyberClick();
    }

    function applyProfile() {
        profile.name = document.getElementById("adminName").value;
        profile.bio = document.getElementById("adminBio").value;
        saveProfileLocal();
        renderPublicLinks();
        showToast("Profil tersimpan");
        playCyberClick();
    }

    // image upload to base64
    document.getElementById("profileUpload")?.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                profile.avatar = ev.target.result;
                saveProfileLocal();
                renderPublicLinks();
                showToast("Foto profil diupdate!");
            };
            reader.readAsDataURL(file);
        }
    });
    document.getElementById("saveProfileBtn")?.addEventListener("click", applyProfile);
    document.getElementById("addLinkBtn")?.addEventListener("click", addNewLink);
    document.getElementById("resetStatsBtn")?.addEventListener("click", () => {
        links.forEach(l => l.clicks = 0);
        saveLinksToLocal();
        renderAdminLinks();
        renderPublicLinks();
        showToast("Statistik direset");
    });
    // Login logic
    document.getElementById("loginPinBtn")?.addEventListener("click", () => {
        const pin = document.getElementById("pinInput").value;
        if(pin === currentPin) {
            isAdminLogged = true;
            document.getElementById("loginPanel").style.display = "none";
            document.getElementById("adminDashboard").style.display = "block";
            renderAdminLinks();
            document.getElementById("adminName").value = profile.name;
            document.getElementById("adminBio").value = profile.bio;
            showToast("Akses GRANTED, Neo-Admin", "success");
            playCyberClick();
        } else { showToast("PIN SALAH! ⚠️", "error"); playCyberClick(); }
    });
    document.getElementById("logoutAdminBtn")?.addEventListener("click", () => {
        isAdminLogged = false;
        document.getElementById("loginPanel").style.display = "block";
        document.getElementById("adminDashboard").style.display = "none";
        showToast("Logout sistem");
    });
    document.getElementById("gotoAdminBtn")?.addEventListener("click", () => {

    // ripple effect on buttons
    document.body.addEventListener("click", (e) => {
        const target = e.target.closest(".neon-btn, button");
        if(target && !target.closest(".toggle-switch")) {
            const ripple = document.createElement("span");
            ripple.className = "ripple";
            const rect = target.getBoundingClientRect();
            ripple.style.left = `${e.clientX - rect.left}px`;
            ripple.style.top = `${e.clientY - rect.top}px`;
            target.style.position = "relative";
            target.style.overflow = "hidden";
            target.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }
    });
